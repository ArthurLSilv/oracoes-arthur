<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Componente Vela Devocional</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background: #10141f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
    }

    /* Card da Vela */
    .card-vela {
      width: 220px;
      background: #1b2233;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 40px 20px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: border-color 0.6s ease, box-shadow 0.6s ease;
    }

    .card-vela.acesa {
      border-color: rgba(232, 179, 75, 0.45);
      box-shadow: 0 0 20px rgba(232, 179, 75, 0.15);
    }

    /* Container da Vela */
    .vela-container {
      position: relative;
      width: 100px;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* Corpo da Vela */
    .vela-corpo {
      position: relative;
      width: 26px;
      height: 62px;
      background: linear-gradient(to bottom, #ede4d0, #d9cdb4);
      border-radius: 6px 6px 3px 3px;
      box-shadow:
        inset 2px 0 4px rgba(0, 0, 0, 0.12),
        0 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* Base (Castiçal) */
    .vela-base {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 12px;
      background: #141a29;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }

    /* Pavio (Apagado) */
    .vela-pavio {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 8px;
      background: #4a5164;
      border-radius: 2px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .card-vela.acesa .vela-pavio {
      opacity: 0;
      pointer-events: none;
    }

    /* Chama */
    .vela-chama {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 26px;
      background: radial-gradient(
        ellipse 8px 10px at 50% 30%,
        #fff4d6 0%,
        #f5c85c 35%,
        #e8952e 70%,
        transparent 100%
      );
      border-radius: 50% 50% 50% 0;
      opacity: 0;
      transition: opacity 0.4s ease 0.2s;
      transform-origin: center bottom;
      box-shadow:
        0 0 8px rgba(245, 200, 92, 0.35),
        0 0 12px rgba(245, 200, 92, 0.2),
        inset -1px 0 2px rgba(232, 149, 46, 0.3);
    }

    .card-vela.acesa .vela-chama {
      opacity: 1;
      animation: tremula 1.6s ease-in-out infinite;
    }

    @keyframes tremula {
      0%, 100% {
        transform: translateX(-50%) scaleX(1) rotate(0deg);
      }
      25% {
        transform: translateX(-50%) scaleX(0.95) rotate(-1.5deg);
      }
      50% {
        transform: translateX(-50%) scaleX(0.92) rotate(1deg);
      }
      75% {
        transform: translateX(-50%) scaleX(0.95) rotate(-0.8deg);
      }
    }

    /* Respeitar preferência de movimento reduzido */
    @media (prefers-reduced-motion: reduce) {
      .card-vela,
      .vela-pavio,
      .vela-chama {
        transition: none;
      }

      .card-vela.acesa .vela-chama {
        animation: none;
      }
    }

    /* Nome da Pessoa */
    .vela-nome {
      font-family: Georgia, serif;
      font-size: 18px;
      color: #f2ead8;
      font-weight: normal;
      letter-spacing: 0.5px;
    }

    /* Botão / Mensagem */
    .vela-acao {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      justify-content: center;
    }

    .btn-orei {
      padding: 10px 20px;
      background: transparent;
      border: 1.5px solid #e8b34b;
      color: #e8b34b;
      border-radius: 24px;
      font-family: Georgia, serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.4s ease;
      opacity: 1;
      pointer-events: auto;
    }

    .btn-orei:hover:not(:disabled) {
      background: rgba(232, 179, 75, 0.1);
      transform: scale(1.05);
    }

    .btn-orei:active:not(:disabled) {
      transform: scale(0.98);
    }

    .card-vela.acesa .btn-orei {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8);
    }

    .msg-orou {
      font-family: Georgia, serif;
      font-size: 14px;
      color: #e8b34b;
      opacity: 0;
      transition: opacity 0.4s ease 0.2s;
      pointer-events: none;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .card-vela.acesa .msg-orou {
      opacity: 1;
    }

    /* Responsivo */
    @media (max-width: 480px) {
      .container {
        gap: 30px;
      }

      .card-vela {
        width: 200px;
        padding: 35px 15px 25px;
      }

      .vela-nome {
        font-size: 16px;
      }

      .btn-orei {
        font-size: 13px;
        padding: 9px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Vela 1 -->
    <div class="card-vela" data-vela="1">
      <div class="vela-container">
        <div class="vela-corpo">
          <div class="vela-pavio"></div>
          <div class="vela-chama"></div>
          <div class="vela-base"></div>
        </div>
      </div>

      <div class="vela-nome">Arthur Silva</div>

      <div class="vela-acao">
        <button class="btn-orei">Orei hoje 🙏</button>
        <div class="msg-orou">orou hoje ✦</div>
      </div>
    </div>

    <!-- Vela 2 -->
    <div class="card-vela" data-vela="2">
      <div class="vela-container">
        <div class="vela-corpo">
          <div class="vela-pavio"></div>
          <div class="vela-chama"></div>
          <div class="vela-base"></div>
        </div>
      </div>

      <div class="vela-nome">Ana Follmann</div>

      <div class="vela-acao">
        <button class="btn-orei">Orei hoje 🙏</button>
        <div class="msg-orou">orou hoje ✦</div>
      </div>
    </div>
  </div>

  <script>
    // Recuperar estado do localStorage
    function recuperarEstado() {
      const estado = localStorage.getItem('velas-acesas');
      if (estado) {
        const acesas = JSON.parse(estado);
        acesas.forEach(id => {
          const card = document.querySelector(`[data-vela="${id}"]`);
          if (card) {
            card.classList.add('acesa');
          }
        });
      }
    }

    // Salvar estado no localStorage
    function salvarEstado() {
      const acesas = Array.from(document.querySelectorAll('.card-vela.acesa'))
        .map(card => card.getAttribute('data-vela'));
      localStorage.setItem('velas-acesas', JSON.stringify(acesas));
    }

    // Event listeners
    document.querySelectorAll('.btn-orei').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const card = e.target.closest('.card-vela');
        card.classList.add('acesa');
        salvarEstado();
      });
    });

    // Recuperar estado ao carregar
    recuperarEstado();
  </script>
</body>
</html>
